services:
  - type: web
    name: bakery-erp-backend
    env: node
    buildFilter:
      paths:
        - server/**
    plan: free
    baseDir: server
    buildCommand: npm ci --build-from-source
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: npm_config_build_from_source
        value: "true"
