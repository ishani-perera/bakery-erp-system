services:
  - type: web
    name: bakery-erp-backend
    env: node
    plan: free
    baseDir: server
    buildCommand: npm install --build-from-source
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: npm_config_build_from_source
        value: "true"
